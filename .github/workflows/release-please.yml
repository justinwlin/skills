name: release-please

# Automated releases. Write Conventional Commits (feat:/fix:/feat!:) and this
# opens/maintains a "release PR" that bumps every version file + regenerates the
# CHANGELOG. Merging that PR tags the release (vX.Y.Z). No manual version edits.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
